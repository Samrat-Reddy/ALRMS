<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Books Management</h1>
    <button class="back-btn" onclick="navigate('index.html')">
        ← Back to Dashboard
    </button>

</header>

<div class="container-column">
    <h2>Add New Book</h2>

    <form id="bookForm">
        <input type="text" id="bookId" placeholder="Book ID" required>
        <input type="text" id="title" placeholder="Title" required>
        <input type="text" id="author" placeholder="Author" required>
        <input type="text" id="category" placeholder="Category" required>
        <input type="number" id="copies" placeholder="Total Copies" required>

        <button type="submit">Add Book</button>
    </form>

    <h2>Book List</h2>

    <table id="bookTable">
        <thead>
        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Copies</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<footer>
    <p><strong>ALRMS</strong> | Automated Library Resource Management System</p>
    <p>Developed by Samrat Reddy &copy; 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
